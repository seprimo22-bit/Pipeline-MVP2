<!DOCTYPE html>
<html>
<head>
<title>Campbell Cognitive Software Pipeline</title>

<style>
body {
    font-family: Arial;
    margin: 40px;
}

textarea {
    width: 100%;
    height: 140px;
}

button {
    padding: 10px 20px;
}

.result {
    background: #eee;
    padding: 15px;
    margin-top: 20px;
    white-space: pre-wrap;
}
</style>
</head>

<body>

<h1>Campbell Cognitive Pipeline</h1>

<h3>Ask a Question</h3>
<textarea id="question"></textarea>

<h3>Paste Article</h3>
<textarea id="article"></textarea>

<!-- ✅ UPLOAD BOX (ONLY NEW UI ELEMENT) -->
<h3>Upload Document</h3>
<input type="file" id="fileUpload" accept=".txt">

<br><br>

<button onclick="runPipeline()">Run Analysis</button>

<div class="result" id="resultBox">
Waiting for analysis...
</div>

<script>
async function runPipeline() {
    const article = document.getElementById("article").value;
    const question = document.getElementById("question").value;

    const response = await fetch("/analyze", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            article: article,
            context: question ? question.split(" ") : []
        })
    });

    const data = await response.json();

    document.getElementById("resultBox").textContent =
        JSON.stringify(data, null, 2);
}

/* ✅ UPLOAD SCRIPT — DOES NOT CHANGE PIPELINE */
document.getElementById("fileUpload").addEventListener("change", function () {

    const file = this.files[0];
    if (!file) return;

    const reader = new FileReader();

    reader.onload = function (e) {
        // fills existing Paste Article box
        document.getElementById("article").value = e.target.result;
    };

    reader.readAsText(file);
});
</script>

</body>
</html>
