<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paper Zero Pipeline</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, sans-serif;
  background: #1a1a2e;
  color: #f0f0f0;
  min-height: 100vh;
  padding: 24px 20px 40px;
}

h1 {
  font-size: 22px;
  font-weight: 900;
  color: #ffffff;
  margin-bottom: 4px;
}

.subtitle {
  font-size: 12px;
  color: #888;
  margin-bottom: 24px;
}

label {
  display: block;
  font-size: 13px;
  font-weight: 700;
  color: #ccc;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: .06em;
}

textarea {
  width: 100%;
  padding: 12px 14px;
  font-size: 14px;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
  color: #111;
  border: none;
  border-radius: 8px;
  resize: vertical;
  margin-bottom: 16px;
  outline: none;
}

textarea:focus {
  box-shadow: 0 0 0 3px rgba(192,39,45,0.4);
}

button {
  width: 100%;
  padding: 16px;
  background: #c0272d;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 900;
  font-family: Arial, sans-serif;
  letter-spacing: .08em;
  cursor: pointer;
  margin-bottom: 28px;
  text-transform: uppercase;
}

button:hover { background: #a01f24; }
button:disabled { background: #555; cursor: not-allowed; }

/* OUTPUT CARDS */
.results { display: none; }

.card {
  background: #f5f5f5;
  color: #111;
  border-radius: 8px;
  padding: 16px;
  margin-bottom: 12px;
}

.card-title {
  font-size: 11px;
  font-weight: 900;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 10px;
  padding-bottom: 8px;
  border-bottom: 2px solid;
}

.card-title.green { color: #1a7a4a; border-color: #1a7a4a; }
.card-title.blue  { color: #1a4a8a; border-color: #1a4a8a; }
.card-title.red   { color: #c0272d; border-color: #c0272d; }
.card-title.gray  { color: #555;    border-color: #ccc; }

.fact-item {
  font-size: 13px;
  line-height: 1.6;
  padding: 6px 0;
  border-bottom: 1px solid #e0e0e0;
  color: #222;
}

.fact-item:last-child { border-bottom: none; }

.empty { font-size: 13px; color: #888; font-style: italic; }

.rel-status {
  font-size: 14px;
  font-weight: 700;
  color: #222;
}

.corpus-source {
  font-size: 11px;
  font-weight: 700;
  color: #c0272d;
  margin-bottom: 2px;
}

.corpus-text {
  font-size: 13px;
  color: #333;
  line-height: 1.5;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<h1>Paper Zero Pipeline</h1>
<div class="subtitle">ORR Framework &bull; 48 Observables &bull; Campbell Corpus</div>

<label>Ask a Question</label>
<textarea id="question" rows="4"
  placeholder="What do you want to analyze?&#10;&#10;Example: What observable events occurred during the 1999 Izmit earthquake?"></textarea>

<label>Paste Article (optional)</label>
<textarea id="article" rows="8"
  placeholder="Paste article or document text here..."></textarea>

<button id="btn" onclick="runAnalysis()">Run Analysis</button>

<div class="results" id="results">

  <div class="card">
    <div class="card-title green">Observe — Facts From Input</div>
    <div id="facts-from-input"></div>
  </div>

  <div class="card">
    <div class="card-title blue">Recognize — Facts About Input</div>
    <div id="facts-about-input"></div>
  </div>

  <div class="card">
    <div class="card-title red">Respond — Relationship Status</div>
    <div id="relationship-status" class="rel-status"></div>
  </div>

  <div class="card">
    <div class="card-title gray">Review — Corpus Matches</div>
    <div id="corpus-matches"></div>
  </div>

</div>

<script>
async function runAnalysis() {
  const q = document.getElementById("question").value.trim();
  const a = document.getElementById("article").value.trim();
  const btn = document.getElementById("btn");
  const results = document.getElementById("results");

  btn.disabled = true;
  btn.innerText = "Running...";
  results.style.display = "none";

  try {
    const res = await fetch("/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question: q, article: a })
    });

    const data = await res.json();

    // FACTS FROM INPUT
    const ffi = document.getElementById("facts-from-input");
    const factsFrom = data.facts_from_input || [];
    ffi.innerHTML = factsFrom.length
      ? factsFrom.map(f => `<div class="fact-item">• ${esc(f)}</div>`).join("")
      : `<div class="empty">No facts extracted from input.</div>`;

    // FACTS ABOUT INPUT
    const fai = document.getElementById("facts-about-input");
    const factsAbout = data.facts_about_input || [];
    fai.innerHTML = factsAbout.length
      ? factsAbout.map(f => `<div class="fact-item">• ${esc(f)}</div>`).join("")
      : `<div class="empty">No background facts generated.</div>`;

    // RELATIONSHIP STATUS
    document.getElementById("relationship-status").innerText =
      data.relationship_status || "No relationship determined.";

    // CORPUS MATCHES
    const cm = document.getElementById("corpus-matches");
    const matches = data.corpus_matches || [];
    cm.innerHTML = matches.length
      ? matches.map(m => `
          <div class="corpus-source">${esc(m.source)}</div>
          <div class="corpus-text">${esc(m.match)}</div>
        `).join("")
      : `<div class="empty">No direct corpus match found.</div>`;

    results.style.display = "block";

  } catch (err) {
    document.getElementById("facts-from-input").innerHTML =
      `<div class="empty">Error: ${esc(err.message)}</div>`;
    results.style.display = "block";
  }

  btn.disabled = false;
  btn.innerText = "Run Analysis";
}

function esc(s) {
  return String(s || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}
</script>

</body>
</html>
